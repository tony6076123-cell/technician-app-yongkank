<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巧克力汽車服務部業績查詢管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233d; --paper:#f3f0e8; --paper-2:#fff; --ink:#16233d; --ink-soft:#5c6a86;
    --line:#d8d2c2; --labor:#2e5da8; --parts:#e2a72e; --out:#56b4d3; --green:#3a7d5c;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{
    background: var(--navy);
    color:#f3f0e8; font-family:'Noto Sans TC',sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 30px 20px;
  }
  .beta{
    font-size:11px; letter-spacing:.2em; border:1px solid rgba(245,192,105,.5);
    color:#f5c069; border-radius:999px; padding:4px 14px; margin-bottom:18px;
    font-family:'Roboto Mono',monospace;
  }
  .brand{ font-size:12px; letter-spacing:.18em; opacity:.55; text-transform:uppercase; font-family:'Roboto Mono',monospace; }
  h1{ margin:8px 0 6px; font-size:30px; font-weight:900; letter-spacing:.04em; }
  .sub{ font-size:13.5px; opacity:.65; margin-bottom:36px; }

  .menu{ width:100%; max-width:420px; display:flex; flex-direction:column; gap:14px; }
  a.item{
    display:flex; align-items:center; gap:16px; text-decoration:none;
    background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.14);
    border-radius:18px; padding:20px 22px; color:#f3f0e8;
    transition: transform .12s, background .12s, border-color .12s;
  }
  a.item:hover{ transform:translateY(-2px); background:rgba(255,255,255,.1); border-color:rgba(245,192,105,.55); }
  a.item:active{ transform:none; }
  .icon{
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .i1{ background:rgba(46,93,168,.35); }
  .i2{ background:rgba(226,167,46,.3); }
  .i3{ background:rgba(86,180,211,.28); }
  .txt .t{ font-size:17.5px; font-weight:900; }
  .txt .d{ font-size:12px; opacity:.6; margin-top:3px; line-height:1.5; }
  .arrow{ margin-left:auto; font-size:22px; opacity:.45; }

  .foot{ margin-top:38px; font-size:11px; opacity:.4; text-align:center; line-height:1.8; }
</style>
</head>
<body>
  <h1 style="font-size:26px; text-align:center; line-height:1.35">巧克力汽車服務部<br>業績查詢管理系統</h1>
  <div class="sub">永康廠・歸仁廠｜技師與接待專員</div>

  <div class="menu">
    <a class="item" href="/board">
      <div class="icon i2">🏆</div>
      <div class="txt">
        <div class="t">全員業績總覽</div>
        <div class="d">兩廠累計與目標達成率、每日達成、全員排行榜（工資/零件/外修）</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="item" href="/review">
      <div class="icon i3">📋</div>
      <div class="txt">
        <div class="t">月度業績檢討</div>
        <div class="d">每人本期 vs 上月同期 vs 去年同期、不足項目與改善施策</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div class="foot">資料來源：每日 205／1G0 報表自動匯入<br>金額均為未稅業績</div>
</body>
</html>
