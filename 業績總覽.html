<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全員業績總覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #16233d;
    --paper: #f3f0e8;
    --paper-2: #ffffff;
    --ink: #16233d;
    --ink-soft: #5c6a86;
    --line: #d8d2c2;
    --labor: #2e5da8;   /* 藍色＝工資 */
    --parts: #e2a72e;   /* 黃色＝零件 */
    --out:   #56b4d3;   /* 水藍＝外修 */
    --green: #3a7d5c;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height:100vh;
  }
  .mono{ font-family:'Roboto Mono', monospace; font-variant-numeric: tabular-nums; }

  .topbar{
    background: var(--navy); color:#f3f0e8;
    padding: 18px 22px; position: sticky; top:0; z-index:20;
    box-shadow: 0 4px 14px rgba(22,35,61,0.25);
  }
  .topbar .brand{ font-size:11px; letter-spacing:.14em; opacity:.65; text-transform:uppercase; font-family:'Roboto Mono',monospace; }
  .topbar h1{ margin:4px 0 0; font-size:22px; font-weight:900; letter-spacing:.02em; }
  .topbar .sub{ margin-top:5px; font-size:12.5px; opacity:.75; }
  .back-btn{
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3);
    color:#f3f0e8; border-radius:999px; padding:6px 16px; font-size:13px; cursor:pointer; margin-bottom:8px;
  }

  /* 設定月目標彈窗 */
  #tgOverlay{ display:none; position:fixed; inset:0; background:rgba(22,35,61,.45); z-index:50; align-items:center; justify-content:center; padding:20px; }
  #tgModal{ background:#fff; border-radius:18px; padding:26px 24px; width:100%; max-width:360px; text-align:center; box-shadow:0 18px 50px rgba(0,0,0,.25); }
  #tgModal h3{ margin:0 0 6px; font-size:18px; font-weight:900; }
  #tgModal p{ margin:0 0 16px; font-size:12.5px; color:var(--ink-soft); }
  #tgModal input{ width:100%; padding:13px; font-size:20px; text-align:center; border:1.5px solid var(--line); border-radius:12px; background:#fbfaf6; font-family:'Roboto Mono',monospace; }
  #tgModal .btns{ display:flex; gap:10px; margin-top:16px; }
  #tgModal button{ flex:1; padding:12px; font-size:15px; font-weight:700; border:none; border-radius:12px; cursor:pointer; }
  #tgModal .ok{ background:var(--navy); color:#fff; }
  #tgModal .cancel{ background:#ece7da; color:var(--ink-soft); }
  #tgErr{ color:#b5432f; font-size:12.5px; min-height:18px; margin-top:10px; }

  .wrap{ max-width: 1080px; margin: 0 auto; padding: 22px 18px 60px; }
  #loading{ text-align:center; padding: 80px 20px; color:var(--ink-soft); }

  /* ===== 首頁：廠卡 ===== */
  .home-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  @media (max-width: 680px){ .home-grid{ grid-template-columns: 1fr; } }
  .plant-card{
    background: var(--paper-2); border:1.5px solid var(--line); border-radius: 18px;
    padding: 24px 24px 20px; cursor:pointer; transition: transform .12s, box-shadow .12s;
  }
  .plant-card:hover{ transform: translateY(-2px); box-shadow: 0 8px 22px rgba(22,35,61,.12); }
  .plant-card .pname{ font-size:20px; font-weight:900; display:flex; justify-content:space-between; align-items:center; }
  .plant-card .pname .arrow{ color:var(--ink-soft); font-size:22px; }
  .plant-card .plabel{ font-size:12px; color:var(--ink-soft); margin-top:16px; }
  .plant-card .pamt{ font-size:30px; font-weight:900; font-family:'Roboto Mono',monospace; margin-top:2px; }
  .pg-wrap{ margin-top:14px; }
  .pg-head{ display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:5px; }
  .pg-head b{ color:var(--ink); font-family:'Roboto Mono',monospace; }
  .pg{ height:12px; border-radius:999px; background:#efe9db; overflow:hidden; }
  .pg i{ display:block; height:100%; border-radius:999px; background: linear-gradient(90deg, var(--labor), #4d7fc9); }
  .pg i.done{ background: linear-gradient(90deg, var(--green), #57a37e); }
  .plant-card .pmeta{ margin-top:12px; font-size:12px; color:var(--ink-soft); display:flex; justify-content:space-between; }

  /* ===== 廠內頁 ===== */
  .kpi-row{ display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom: 18px; }
  @media (max-width: 720px){ .kpi-row{ grid-template-columns: repeat(2, 1fr); } }
  .kpi{ background: var(--paper-2); border:1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
  .kpi .label{ font-size:12px; color:var(--ink-soft); }
  .kpi .value{ font-size:23px; font-weight:900; margin-top:4px; font-family:'Roboto Mono',monospace; }
  .kpi .value small{ font-size:12px; font-weight:400; color:var(--ink-soft); margin-left:2px; }
  .kpi.hero{ background: var(--navy); border-color: var(--navy); color:#fff; }
  .kpi.hero .label{ color:rgba(255,255,255,.65); }
  .kpi.hero .value{ color: #f5c069; }

  .board{
    background: var(--paper-2); border:1px solid var(--line); border-radius: var(--radius);
    padding: 18px 18px 12px; margin-bottom: 18px;
  }
  .board h2{ margin:0 0 2px; font-size:16.5px; font-weight:900; display:flex; align-items:baseline; gap:8px; }
  .board h2 .count{ font-size:12px; font-weight:400; color:var(--ink-soft); }
  .board .legend{ display:flex; gap:14px; font-size:12px; color:var(--ink-soft); margin: 8px 0 4px; flex-wrap:wrap; }
  .legend i{ display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:4px; vertical-align:-1px; }
  .lg-labor i{ background: var(--labor); }
  .lg-parts i{ background: var(--parts); }
  .lg-out i{ background: var(--out); }
  .hint{ font-size:11.5px; color:var(--ink-soft); margin: 0 0 10px; }

  /* 每日達成率 */
  .dayrate{ padding-bottom: 6px; }
  .dayrate .dayrow .dv{ width: 150px; }
  .dayrow{ display:flex; align-items:center; gap:10px; padding:4px 0; font-size:13px; }
  .dayrow .dt{ width:64px; font-family:'Roboto Mono',monospace; color:var(--ink-soft); flex-shrink:0; }
  .dayrow .dbar{ flex:1; height:14px; border-radius:4px; background:#efe9db; overflow:hidden; }
  .dayrow .dbar i{ display:block; height:100%; border-radius:4px; }
  .dayrow .dv{ width:92px; text-align:right; font-family:'Roboto Mono',monospace; font-weight:700; flex-shrink:0; }
  .dayrow .dv small{ font-weight:400; color:var(--ink-soft); }
  .dayrow.total{ border-top:1px solid var(--line); margin-top:5px; padding-top:7px; font-weight:900; }
  .dayrow.total .dt{ color:var(--ink); font-weight:900; }
  .noneset{ font-size:13px; color:var(--ink-soft); padding: 8px 0 4px; }
  .set-target-btn{
    border:none; background: var(--navy); color:#fff; border-radius:8px;
    padding:6px 14px; font-size:13px; cursor:pointer; font-family:inherit;
  }
  .edit-target{
    border:none; background:none; color:var(--ink-soft); font-size:11px;
    cursor:pointer; padding:2px 4px; text-decoration:underline; font-family:inherit;
  }

  /* 排行列 */
  .rankrow{ display:flex; align-items:center; gap:10px; padding: 8px 0; border-top: 1px dashed #eae5d8; }
  .rk{ width: 34px; text-align:center; font-family:'Roboto Mono',monospace; font-weight:700; font-size:15px; color:var(--ink-soft); flex-shrink:0; }
  .rk.m1{ font-size:20px; } .rk.m2{ font-size:18px; } .rk.m3{ font-size:17px; }
  .who{ width: 96px; flex-shrink:0; }
  .who .nm{ font-weight:700; font-size:14.5px; line-height:1.2; }
  .who .dp{ font-size:10.5px; color:var(--ink-soft); }
  .barzone{ flex:1; min-width:0; }
  .bar{ display:flex; height: 26px; border-radius: 7px; overflow:hidden; background:#f0ece1; }
  .seg{ height:100%; cursor:pointer; transition: filter .15s; }
  .seg:hover{ filter: brightness(1.15); }
  .seg.labor{ background: var(--labor); }
  .seg.parts{ background: var(--parts); }
  .seg.out{ background: var(--out); }
  .amt{ width: 108px; text-align:right; font-family:'Roboto Mono',monospace; font-weight:700; font-size:14.5px; flex-shrink:0; }
  .amt small{ display:block; font-weight:400; font-size:10.5px; color:var(--ink-soft); }

  /* 點開的明細面板 */
  .detail{
    margin: 2px 0 10px 44px; border:1.5px solid var(--line); border-radius: 12px;
    background: #fbfaf6; padding: 14px 16px; animation: pop .18s ease;
  }
  @keyframes pop{ from{ opacity:0; transform: translateY(-4px);} to{opacity:1; transform:none;} }
  .detail .dhead{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .detail .dhead .t{ font-weight:900; font-size:15px; }
  .detail .close{ border:none; background:#ece7da; border-radius:8px; padding:4px 12px; font-size:12px; cursor:pointer; color:var(--ink-soft); }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .chip{
    border:1.5px solid var(--line); border-radius: 999px; padding: 6px 14px;
    font-size:13px; cursor:pointer; background:#fff; user-select:none;
    display:flex; align-items:center; gap:6px;
  }
  .chip i{ width:10px; height:10px; border-radius:3px; display:inline-block; }
  .chip.labor i{ background:var(--labor);} .chip.parts i{ background:var(--parts);} .chip.out i{ background:var(--out);}
  .chip b{ font-family:'Roboto Mono',monospace; }
  .chip.on.labor{ background:var(--labor); color:#fff; border-color:var(--labor); }
  .chip.on.parts{ background:var(--parts); color:#fff; border-color:var(--parts); }
  .chip.on.out{ background:var(--out); color:#fff; border-color:var(--out); }
  .chip.on i{ background:#fff; }
  .dsec-title{ font-size:12px; color:var(--ink-soft); margin: 12px 0 6px; font-weight:700; }
  .detail .dayrow .dt{ width:88px; }

  table.items{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:4px; }
  table.items th{ text-align:left; color:var(--ink-soft); font-weight:500; font-size:11px; padding:4px 6px; border-bottom:1px solid var(--line); }
  table.items td{ padding:5px 6px; border-bottom:1px dashed #eae5d8; }
  table.items td.r, table.items th.r{ text-align:right; font-family:'Roboto Mono',monospace; }
  .items-note{ font-size:11px; color:var(--ink-soft); margin-top:8px; }

  .empty{ color:var(--ink-soft); font-size:14px; padding: 18px 4px 22px; }
  .foot{ text-align:center; color:var(--ink-soft); font-size:11.5px; margin-top:8px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn" onclick="goBack()">‹ 回主選單</button>
  <div class="brand">CHOCOLATE MOTORS</div>
  <h1 id="pageTitle">全員業績總覽</h1>
  <div class="sub" id="subTitle">載入中…</div>
</div>

<div class="wrap">
  <div id="loading">📊 資料載入中，請稍候…</div>

  <!-- 首頁：兩廠卡片 -->
  <div id="homeView" style="display:none">
    <div class="home-grid" id="homeGrid"></div>
    <div class="foot">點選廠區查看每日達成率與全員排行｜金額均為未稅業績</div>
  </div>

  <!-- 廠內頁 -->
  <div id="plantView" style="display:none">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="board dayrate" id="rateBoard"></div>
    <div class="board" id="boardTech"></div>
    <div class="board" id="boardAdv"></div>
    <div class="foot">金額均為未稅業績｜資料來源：每日 205／1G0 報表自動匯入</div>
  </div>
</div>

<!-- 設定月目標彈窗 -->
<div id="tgOverlay">
  <div id="tgModal">
    <h3 id="tgTitle">設定月目標</h3>
    <p id="tgDesc"></p>
    <input type="text" id="tgInput" inputmode="numeric" placeholder="例：6000000" onkeydown="if(event.key==='Enter')submitTarget()">
    <div id="tgErr"></div>
    <div class="btns">
      <button class="cancel" onclick="closeTarget()">取消</button>
      <button class="ok" onclick="submitTarget()">確定</button>
    </div>
  </div>
</div>

<script>
const el = id => document.getElementById(id);
const fmt = n => Math.round(n||0).toLocaleString('zh-TW');
const CATS = { labor:{name:'工資', color:'var(--labor)', field:'labor_amt'},
               parts:{name:'零件', color:'var(--parts)', field:'parts_amt'},
               out:{name:'外修', color:'var(--out)', field:'outsourced_amt'} };
const LOCS = ['永康','歸仁'];
let DATA = null;
let curLoc = null;    // null = 首頁
let openKey = null;
let openCat = null;

const curMonth = () => new Date().toISOString().slice(0,7);

// 🦞 與 技師業績.html 的 sumMonthToDate 同一套口徑：本月 = 加總當月每日快照
function monthlySums(perf){
  const cm = curMonth();
  const map = new Map();
  (perf||[]).forEach(r => {
    if (!r.period_end || !r.period_end.startsWith(cm)) return;
    const key = r.location + '|' + r.role + '|' + r.employee;
    if (!map.has(key)) map.set(key, { key, employee:r.employee, role:r.role, location:r.location, dept:r.dept,
      order_count:0, hours:0, labor_amt:0, parts_amt:0, outsourced_amt:0, untaxed_amt:0, lastDay:'' });
    const s = map.get(key);
    s.order_count += r.order_count||0; s.hours += r.hours||0;
    s.labor_amt += r.labor_amt||0; s.parts_amt += r.parts_amt||0;
    s.outsourced_amt += r.outsourced_amt||0; s.untaxed_amt += r.untaxed_amt||0;
    if (r.period_end > s.lastDay) { s.lastDay = r.period_end; s.dept = r.dept; }
  });
  return [...map.values()];
}

// 某廠當月逐日全廠業績（date → 當日全廠未稅合計）
function plantDaily(loc){
  const cm = curMonth();
  const byDay = new Map();
  (DATA.performance||[]).forEach(r => {
    if (r.location !== loc || !r.period_end || !r.period_end.startsWith(cm)) return;
    byDay.set(r.period_end, (byDay.get(r.period_end)||0) + (r.untaxed_amt||0));
  });
  return [...byDay.entries()].map(([d,v])=>({date:d, amt:v})).sort((a,b)=>a.date.localeCompare(b.date));
}

function plantStats(loc){
  const sums = monthlySums(DATA.performance).filter(s => s.location === loc);
  const total = sums.reduce((a,s)=>a+s.untaxed_amt,0);
  const orders = sums.reduce((a,s)=>a+s.order_count,0);
  const lastDay = sums.reduce((a,s)=> s.lastDay>a?s.lastDay:a, '');
  const target = (DATA.targets||[]).find(t => t._id === `${loc}_${curMonth()}`);
  const targetAmt = target ? (target.target_amt||0) : 0;
  const pct = targetAmt ? Math.round(total/targetAmt*1000)/10 : null;
  return { loc, sums, total, orders, lastDay, targetAmt, pct, people: sums.length };
}

function dailyRows(employee, role, location){
  const cm = curMonth();
  return (DATA.performance||[]).filter(p => p.employee===employee && p.role===role && p.location===location
      && p.period_end && p.period_end.startsWith(cm))
    .sort((a,b)=>a.period_end.localeCompare(b.period_end));
}

function partsItems(employee, location){
  const cm = curMonth();
  const rows = (DATA.parts||[]).filter(p => p.employee===employee && p.location===location
      && p.period_end && p.period_end.startsWith(cm));
  const itemMap = new Map();
  rows.forEach(r => {
    let items = [];
    try{ items = r.items_json ? JSON.parse(r.items_json) : []; }catch(e){}
    items.forEach(it => {
      const key = it.partNo+'|'+it.desc;
      if (!itemMap.has(key)) itemMap.set(key, { partNo:it.partNo, desc:it.desc, qty:0, amt:0 });
      const e2 = itemMap.get(key); e2.qty += it.qty||0; e2.amt += it.amt||0;
    });
  });
  return [...itemMap.values()].sort((a,b)=>b.amt-a.amt);
}

function medal(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1); }

/* ===== 首頁 ===== */
function goHome(){
  curLoc = null; openKey = null; openCat = null;
  el('backBtn').textContent = '‹ 回主選單';
  el('pageTitle').textContent = '全員業績總覽';
  const m = new Date();
  el('subTitle').textContent = `${m.getFullYear()} 年 ${m.getMonth()+1} 月｜選擇廠區`;
  el('plantView').style.display = 'none';
  el('homeView').style.display = '';
  el('homeGrid').innerHTML = LOCS.map(loc => {
    const st = plantStats(loc);
    const pctBar = st.pct !== null ? Math.min(100, st.pct) : 0;
    return `<div class="plant-card" onclick="openPlant('${loc}')">
      <div class="pname">${loc}廠 <span class="arrow">›</span></div>
      <div class="plabel">本月累計業績</div>
      <div class="pamt">$${fmt(st.total)}</div>
      <div class="pg-wrap">
        <div class="pg-head"><span>月目標達成</span>
          <b>${st.pct !== null ? st.pct + '%' : '目標未設定'}</b></div>
        <div class="pg"><i class="${st.pct !== null && st.pct >= 100 ? 'done':''}" style="width:${pctBar}%"></i></div>
        <div class="pg-head" style="margin-top:5px"><span>月目標</span>
          <b>${st.targetAmt ? '$'+fmt(st.targetAmt) : '—'}</b></div>
      </div>
      <div class="pmeta"><span>${st.people} 人有本月資料</span><span>資料截至 ${st.lastDay || '—'}</span></div>
    </div>`;
  }).join('');
}

/* ===== 廠內頁 ===== */
function openPlant(loc){
  curLoc = loc; openKey = null; openCat = null;
  el('backBtn').textContent = '‹ 回廠區總覽';
  el('homeView').style.display = 'none';
  el('plantView').style.display = '';
  render();
}

function render(){
  const st = plantStats(curLoc);
  el('pageTitle').textContent = `${curLoc}廠 業績總覽`;
  const m = new Date();
  el('subTitle').textContent = `${m.getFullYear()} 年 ${m.getMonth()+1} 月｜技師＋接待專員全員排名`;

  el('kpiRow').innerHTML = `
    <div class="kpi hero"><div class="label">${curLoc}廠 本月累計業績</div><div class="value">$${fmt(st.total)}</div></div>
    <div class="kpi"><div class="label">月目標達成 <button class="edit-target" onclick="setTarget('${curLoc}')">${st.targetAmt?'修改':'設定'}目標</button></div><div class="value">${st.pct!==null? st.pct+'<small>%</small>' : '－<small>未設定</small>'}</div></div>
    <div class="kpi"><div class="label">工單數</div><div class="value">${fmt(st.orders)}<small>張</small></div></div>
    <div class="kpi"><div class="label">資料截至</div><div class="value" style="font-size:17px">${st.lastDay || '—'}</div></div>
  `;

  // 每日達成率
  const days = plantDaily(curLoc);
  let rateHTML = `<h2>📈 每日達成率 <span class="count">當日業績／累計達成率</span></h2>`;
  if (!st.targetAmt){
    rateHTML += `<div class="noneset">尚未設定本月目標，無法計算達成率　<button class="set-target-btn" onclick="setTarget('${curLoc}')">＋ 設定月目標</button></div>`;
    if (days.length){
      const maxD = Math.max(...days.map(d=>d.amt),1);
      rateHTML += days.map(d=>`<div class="dayrow">
        <div class="dt">${d.date.slice(5)}</div>
        <div class="dbar"><i style="width:${Math.max(1,d.amt/maxD*100)}%; background:var(--labor)"></i></div>
        <div class="dv">$${fmt(d.amt)}</div>
      </div>`).join('');
    }
  } else if (!days.length){
    rateHTML += `<div class="noneset">本月尚無每日資料</div>`;
  } else {
    let cum = 0;
    rateHTML += days.map(d=>{
      cum += d.amt;
      const pct = Math.round(cum/st.targetAmt*1000)/10;
      return `<div class="dayrow">
        <div class="dt">${d.date.slice(5)}</div>
        <div class="dbar"><i style="width:${Math.min(100,pct)}%; background:${pct>=100?'var(--green)':'var(--labor)'}"></i></div>
        <div class="dv">${pct}%<small> ($${fmt(d.amt)})</small></div>
      </div>`;
    }).join('');
    rateHTML += `<div class="dayrow total"><div class="dt">月累計</div><div class="dbar" style="background:none"></div>
      <div class="dv">${st.pct}%<small> ($${fmt(st.total)})</small></div></div>`;
  }
  el('rateBoard').innerHTML = rateHTML;

  const tech = st.sums.filter(s=>s.role==='技師').sort((a,b)=>b.untaxed_amt-a.untaxed_amt);
  const adv  = st.sums.filter(s=>s.role==='接待').sort((a,b)=>b.untaxed_amt-a.untaxed_amt);
  renderBoard('boardTech', '🔧 承修技師排行', tech);
  renderBoard('boardAdv', '🤝 接待專員排行', adv);
}

// 🦞 返回鍵：廠內頁→廠區總覽；廠區總覽→App主選單
function goBack(){
  if (curLoc !== null){ goHome(); }
  else { window.location.href = '/'; }
}

// 🦞 設定/修改月目標：彈出視窗輸入（不用 prompt，部分手機瀏覽器會擋 prompt）
let tgLoc = null;
function setTarget(loc){
  tgLoc = loc;
  const cur = (DATA.targets||[]).find(t => t._id === `${loc}_${curMonth()}`);
  el('tgTitle').textContent = `${loc}廠 設定月目標`;
  el('tgDesc').textContent = `${curMonth()} 的目標金額（元）`;
  el('tgInput').value = cur ? cur.target_amt : '';
  el('tgErr').textContent = '';
  el('tgOverlay').style.display = 'flex';
  setTimeout(()=>el('tgInput').focus(), 50);
}
function closeTarget(){ el('tgOverlay').style.display = 'none'; tgLoc = null; }
async function submitTarget(){
  const loc = tgLoc;
  const amt = Number(String(el('tgInput').value).replace(/[,\s元$]/g, ''));
  if (!amt || amt <= 0){ el('tgErr').textContent = '請輸入正確的金額數字'; return; }
  el('tgErr').textContent = '儲存中…';
  try{
    const res = await fetch('/api/set-target', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code:'mgr_gm', location:loc, month:curMonth(), target_amt:amt })
    });
    const r = await res.json();
    if (!r.ok) throw new Error(r.error||'寫入失敗');
    const id = `${loc}_${curMonth()}`;
    const t = (DATA.targets||[]).find(t => t._id === id);
    if (t) t.target_amt = amt;
    else { DATA.targets = DATA.targets||[]; DATA.targets.push({ _id:id, location:loc, target_amt:amt }); }
    closeTarget();
    if (curLoc) render(); else goHome();
  }catch(e){
    el('tgErr').textContent = '❌ 設定失敗：' + e.message;
  }
}

function toggleDetail(key, cat){
  if (openKey === key && openCat === cat){ openKey = null; openCat = null; }
  else { openKey = key; openCat = cat; }
  render();
}
function switchCat(key, cat){ openKey = key; openCat = cat; render(); }
function closeDetail(){ openKey = null; openCat = null; render(); }

function detailHTML(s){
  const cat = CATS[openCat];
  const days = dailyRows(s.employee, s.role, s.location);
  const monthTotal = s[cat.field] || 0;
  const maxDay = Math.max(...days.map(d=>d[cat.field]||0), 1);
  const dayList = days.map(d => {
    const v = d[cat.field]||0;
    return `<div class="dayrow">
      <div class="dt">${(d.period_end||'').slice(5)}</div>
      <div class="dbar"><i style="width:${Math.max(1,v/maxDay*100)}%; background:${cat.color}"></i></div>
      <div class="dv">$${fmt(v)}</div>
    </div>`;
  }).join('');

  let itemsHTML = '';
  if (openCat === 'parts' && s.role === '技師'){
    const items = partsItems(s.employee, s.location);
    if (items.length){
      itemsHTML = `<div class="dsec-title">🧾 零件品項明細（本月，來自1G0報表）</div>
      <table class="items">
        <tr><th>品名</th><th>料號</th><th class="r">數量</th><th class="r">金額</th></tr>
        ${items.slice(0,15).map(it=>`<tr><td>${it.desc||''}</td><td class="mono" style="font-size:11px">${it.partNo||''}</td><td class="r">${it.qty}</td><td class="r">$${fmt(it.amt)}</td></tr>`).join('')}
      </table>
      ${items.length>15?`<div class="items-note">僅列前 15 項（共 ${items.length} 項）</div>`:''}
      <div class="items-note">品項加總可能與上方零件金額有小落差（205 與 1G0 兩份報表統計口徑差異）</div>`;
    } else {
      itemsHTML = `<div class="items-note">本月尚無零件品項明細資料</div>`;
    }
  }

  return `<div class="detail">
    <div class="dhead">
      <div class="t">${s.employee}｜${cat.name}明細</div>
      <button class="close" onclick="closeDetail()">收合 ✕</button>
    </div>
    <div class="chips">
      ${Object.keys(CATS).map(c=>`
        <div class="chip ${c} ${c===openCat?'on':''}" onclick="switchCat('${s.key}','${c}')">
          <i></i>${CATS[c].name} <b>$${fmt(s[CATS[c].field])}</b>
        </div>`).join('')}
    </div>
    <div class="dsec-title">📅 ${cat.name}日累計（每天寄一次報表＝一筆）</div>
    ${dayList || '<div class="items-note">本月尚無每日資料</div>'}
    <div class="dayrow total">
      <div class="dt">月累計</div><div class="dbar" style="background:none"></div>
      <div class="dv">$${fmt(monthTotal)}</div>
    </div>
    ${itemsHTML}
  </div>`;
}

function renderBoard(elId, title, rows){
  const box = el(elId);
  if (!rows.length){
    box.innerHTML = `<h2>${title} <span class="count">0 人</span></h2><div class="empty">本月尚無資料（報表尚未匯入）</div>`;
    return;
  }
  const max = Math.max(...rows.map(r=>r.untaxed_amt), 1);
  box.innerHTML = `
    <h2>${title} <span class="count">${rows.length} 人｜按本月業績排名</span></h2>
    <div class="legend">
      <span class="lg-labor"><i></i>工資</span>
      <span class="lg-parts"><i></i>零件</span>
      <span class="lg-out"><i></i>外修</span>
    </div>
    <div class="hint">👆 點長條圖上的顏色區塊，展開該項目的金額與每日明細</div>
    ${rows.map((r,i)=>{
      const w = Math.max(2, r.untaxed_amt/max*100);
      const base = (r.labor_amt + r.parts_amt + r.outsourced_amt) || 1;
      const wl = r.labor_amt/base*w, wp = r.parts_amt/base*w, wo = r.outsourced_amt/base*w;
      const opened = openKey === r.key;
      return `<div class="rankrow">
        <div class="rk ${i<3?'m'+(i+1):''}">${medal(i)}</div>
        <div class="who"><div class="nm">${r.employee}</div><div class="dp">${r.dept||''}</div></div>
        <div class="barzone"><div class="bar">
          <div class="seg labor" style="width:${wl}%" title="工資 $${fmt(r.labor_amt)}" onclick="toggleDetail('${r.key}','labor')"></div>
          <div class="seg parts" style="width:${wp}%" title="零件 $${fmt(r.parts_amt)}" onclick="toggleDetail('${r.key}','parts')"></div>
          <div class="seg out" style="width:${wo}%" title="外修 $${fmt(r.outsourced_amt)}" onclick="toggleDetail('${r.key}','out')"></div>
        </div></div>
        <div class="amt">$${fmt(r.untaxed_amt)}<small>${r.order_count} 張工單</small></div>
      </div>
      ${opened ? detailHTML(r) : ''}`;
    }).join('')}
  `;
}

// 🦞 免費雲端主機休眠喚醒需要幾十秒，第一次抓資料失敗就自動重試，不要直接顯示失敗
async function init(){
  const MAX_TRY = 5;
  for (let i = 1; i <= MAX_TRY; i++){
    try{
      if (i > 1) el('loading').textContent = `⏳ 伺服器喚醒中，自動重試（第 ${i}/${MAX_TRY} 次）…`;
      const res = await fetch('/api/my-performance?code=mgr_gm');
      DATA = await res.json();
      if (!DATA.ok) throw new Error(DATA.error||'讀取失敗');
      el('loading').style.display = 'none';
      goHome();
      return;
    }catch(e){
      if (i === MAX_TRY){
        el('loading').innerHTML = '❌ 載入失敗：' + e.message + '<br><br><button onclick="location.reload()" style="padding:10px 24px;font-size:15px;border:none;border-radius:10px;background:#16233d;color:#fff;cursor:pointer">🔄 再試一次</button>';
      } else {
        await new Promise(r => setTimeout(r, 8000));
      }
    }
  }
}
init();
</script>
